<!DOCTYPE html>
<html lang="fr">
<head>	
	<meta charset="utf-8">
    <title>Felix's Video Player</title>
        
    <link  	href="../fonts/fonts.css" rel="stylesheet" type="text/css" />
    
	<link  	href="../css/video.css" rel="stylesheet" type="text/css" />
	<script src="../js/jquery-1.11.2.min.js" type="text/javascript"></script>
	<script src="../js/videoplayer.js" type="text/javascript"></script>
	<style>
		html, body {
			margin: 0px;
			padding: 0px;
			background: #ccc;
			font-family: Arial, Helvetica;
			
		}

		a, a:link, a:visited {
			text-decoration: none;
			color: inherit;
		}
		a img, a:link img, a:visited img {
			padding: 0px;
			margin: 0px;
			border: none;
			background: none;
		}
		p {
			margin: 0px;
		}
		#page {
			margin: 50px;
		}
	</style>
</head>
<body>

	<div id="chap1"></div>
	<script type="text/javascript">
		var videoPlayer1 = new VideoPlayer('chap1', '../media/video/sequenceteste.mp4');
		videoPlayer1.subtitles = new Array(
				{ time:0 , text: 'A. La réception'},
				{ time:29 , text: ' '},
				{ time:30 , text: 'B. Mon interprétation du réel'},
		);
		videoPlayer1.setTitle('Au Depart');
	</script>

	<div id="chap2"></div>
	<script type="text/javascript">
		var videoPlayer2 = new VideoPlayer('chap2', '../media/video/sequenceteste2.mp4');
		videoPlayer2.subtitles = new Array(
				{ time:0 , text: 'A. Designer'},
				{ time:29 , text: ' '},
				{ time:30 , text: 'B. gagagaga'},
		);
		videoPlayer2.setTitle('Chapitre 2 :  La efqqdfz');
	</script>
	
	
</body>
</html>
